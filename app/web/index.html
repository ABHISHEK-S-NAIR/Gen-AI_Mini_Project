<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperMind Control Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/web/style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <header class="topbar">
    <h1>PaperMind</h1>
    <p>Multi-Document Research Analysis Console</p>
  </header>

  <main class="layout">
    <section class="card card-upload">
      <h2>Upload Papers</h2>
      <form id="upload-form">
        <input id="pdf-files" type="file" accept="application/pdf" multiple required />
        <button type="submit">Ingest PDFs</button>
      </form>
      <p id="upload-status" class="status"></p>
    </section>

    <section class="card card-papers">
      <div class="panel-title-row">
        <h2>Ingested Papers</h2>
        <button id="refresh-papers" type="button" class="secondary">Refresh</button>
      </div>
      <div class="papers-selection-info">
        <span id="selection-count">0 selected</span>
        <div>
          <button id="select-all-papers" type="button" class="secondary">Select All</button>
          <button id="deselect-all-papers" type="button" class="secondary">Deselect All</button>
        </div>
      </div>
      <ul id="papers-list" class="papers-list"></ul>
    </section>

    <section class="card card-task">
      <h2>Run Task</h2>
      <form id="task-form">
        <label>
          Task
          <select id="task-type" required>
            <option value="analyse">analyse</option>
            <option value="review">review</option>
            <option value="citations">citations</option>
            <option value="ask">ask</option>
            <option value="explain">explain</option>
            <option value="gaps">gaps</option>
            <option value="hypotheses">hypotheses</option>
          </select>
        </label>

        <div id="query-group">
          <label>
            Query / Question (for ask)
            <textarea id="task-query" rows="4" placeholder="Ask a question about your papers"></textarea>
          </label>
        </div>

        <div id="level-group">
          <label>
            Explanation Level (for explain)
            <select id="task-level">
              <option value="beginner">Beginner - Simple summary</option>
              <option value="intermediate">Intermediate - Structured breakdown</option>
              <option value="expert">Expert - Technical details</option>
              <option value="visual">Visual - Architecture diagram</option>
              <option value="training">Training - Training vs Inference</option>
              <option value="pipeline">Pipeline - Layer-by-layer inference</option>
              <option value="components">Components - Detailed breakdown</option>
            </select>
          </label>
        </div>

        <button type="submit">Execute Task</button>
      </form>
      <p id="task-status" class="status"></p>
    </section>

    <section class="card card-output">
      <h2>Output</h2>
      <div class="output-controls">
        <button id="collapse-all" type="button" class="secondary small">Collapse All</button>
        <button id="expand-all" type="button" class="secondary small">Expand All</button>
      </div>
      <div id="result-readable" class="result-readable">No results yet.</div>
      <details class="raw-details">
        <summary>Show raw JSON</summary>
        <pre id="result-json">No results yet.</pre>
      </details>
    </section>
  </main>

  <script src="/web/app.js"></script>
</body>
</html>
